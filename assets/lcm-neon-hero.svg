<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-label="LCM neon validation hero">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#020613"/>
      <stop offset="100%" stop-color="#070d1f"/>
    </linearGradient>
    <linearGradient id="aurora1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#19e3ff" stop-opacity="0"/>
      <stop offset="30%" stop-color="#19e3ff" stop-opacity="0.8"/>
      <stop offset="60%" stop-color="#8f5bff" stop-opacity="0.75"/>
      <stop offset="100%" stop-color="#8f5bff" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="soft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
    <style>
      .title{font:700 138px Orbitron,Exo 2,Segoe UI,Arial,sans-serif;letter-spacing:6px;fill:#e9f7ff}
      .subtitle{font:500 28px Inter,Segoe UI,Arial,sans-serif;letter-spacing:4px;fill:#9fd7ff}
      .chip{font:500 18px Inter,Segoe UI,Arial,sans-serif;fill:#dbf6ff}
      .panelH{font:700 20px Inter,Segoe UI,Arial,sans-serif;letter-spacing:2px;fill:#7de8ff}
      .k{font:600 16px Inter,Segoe UI,Arial,sans-serif;fill:#7de8ff}
      .v{font:500 17px Inter,Segoe UI,Arial,sans-serif;fill:#dff1ff}
      .tiny{font:500 14px Inter,Segoe UI,Arial,sans-serif;fill:#9fb9d9}
    </style>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <path d="M30 110 C220 40, 420 170, 620 100 C860 20, 1030 190, 1270 90 C1410 35, 1510 85, 1570 130" stroke="url(#aurora1)" stroke-width="38" fill="none" filter="url(#soft)"/>
  <path d="M60 170 C250 130, 450 230, 680 170 C900 120, 1120 250, 1380 165 C1490 130, 1540 150, 1580 200" stroke="url(#aurora1)" stroke-width="18" fill="none" opacity="0.85"/>

  <!-- mountain horizon -->
  <path d="M0 560 L120 490 L220 535 L330 470 L450 545 L560 485 L690 550 L820 470 L970 560 L1080 480 L1210 550 L1320 500 L1450 560 L1600 520 L1600 900 L0 900 Z" fill="#0b1227"/>
  <path d="M0 584 L1600 556" stroke="#1b2b50" stroke-width="2" opacity="0.9"/>

  <!-- central mark -->
  <polygon points="800,145 845,208 755,208" fill="#b8f0ff" opacity="0.9" filter="url(#glow)"/>
  <line x1="800" y1="100" x2="800" y2="145" stroke="#9ef0ff" stroke-width="2"/>
  <circle cx="800" cy="96" r="5" fill="#c8f7ff" filter="url(#glow)"/>

  <!-- center title block -->
  <text x="800" y="365" text-anchor="middle" class="title" filter="url(#glow)">LCM CORE</text>
  <text x="800" y="405" text-anchor="middle" class="subtitle">LOSSLESS CONTEXT MEMORY FOR HERMES</text>

  <rect x="458" y="438" width="684" height="56" rx="12" fill="#09142a" stroke="#2bd9ff" opacity="0.9"/>
  <text x="800" y="472" text-anchor="middle" class="chip">Crash-safe persistence • WAL discipline • Retrieval-first memory • Compression without amnesia</text>

  <!-- Left panel -->
  <rect x="35" y="45" width="360" height="700" rx="16" fill="#081327" stroke="#2adfff" opacity="0.95"/>
  <text x="58" y="85" class="panelH">ARCHITECTURE & RELIABILITY</text>
  <line x1="58" y1="98" x2="370" y2="98" stroke="#2adfff" opacity="0.4"/>

  <text x="58" y="136" class="k">Engine Mode</text><text x="210" y="136" class="v">context.engine=lcm</text>
  <text x="58" y="170" class="k">Integrity</text><text x="210" y="170" class="v">PRAGMA integrity_check = OK</text>
  <text x="58" y="204" class="k">Crash/Restart</text><text x="210" y="204" class="v">PASS</text>
  <text x="58" y="238" class="k">Summary Graph</text><text x="210" y="238" class="v">Parent-linked DAG</text>

  <rect x="58" y="268" width="314" height="108" rx="10" fill="#0b1b36" stroke="#3a64a8"/>
  <text x="74" y="296" class="tiny">SOAK SCALE</text>
  <text x="74" y="328" class="v">250,000 messages</text>
  <text x="74" y="356" class="tiny">DB ~122MB • WAL → 0MB after checkpoint</text>

  <rect x="58" y="396" width="314" height="120" rx="10" fill="#0b1b36" stroke="#3a64a8"/>
  <text x="74" y="424" class="tiny">CONCURRENCY</text>
  <text x="74" y="456" class="v">2,298 reads • 0 errors</text>
  <text x="74" y="484" class="tiny">p50 33.72ms • p95 115.62ms</text>

  <rect x="58" y="536" width="314" height="184" rx="10" fill="#0b1b36" stroke="#3a64a8"/>
  <text x="74" y="564" class="tiny">BLIND BAKE-OFF (3 TESTS)</text>
  <text x="74" y="596" class="v">LCM wins 3/3</text>
  <text x="74" y="628" class="tiny">Fact recall: 100% vs 0%</text>
  <text x="74" y="658" class="tiny">Anchor pair recall: 100% vs 0%</text>
  <text x="74" y="688" class="tiny">Latest override correctness: PASS vs FAIL</text>

  <!-- Right panel -->
  <rect x="1205" y="45" width="360" height="700" rx="16" fill="#081327" stroke="#9a62ff" opacity="0.95"/>
  <text x="1228" y="85" class="panelH" fill="#c1a3ff">ROUTING & OPS SIGNALS</text>
  <line x1="1228" y1="98" x2="1540" y2="98" stroke="#9a62ff" opacity="0.4"/>

  <rect x="1228" y="126" width="314" height="132" rx="10" fill="#0e1534" stroke="#7e56d8"/>
  <text x="1244" y="154" class="tiny">CANARY WINDOW</text>
  <text x="1244" y="186" class="v">72h live monitoring</text>
  <text x="1244" y="214" class="tiny">hourly metrics + 15m threshold checks</text>
  <text x="1244" y="238" class="tiny">alerts only on breach</text>

  <rect x="1228" y="278" width="314" height="196" rx="10" fill="#0e1534" stroke="#7e56d8"/>
  <text x="1244" y="306" class="tiny">CHECKPOINT POLICY</text>
  <text x="1244" y="338" class="v">WAL > 256MB → alert</text>
  <text x="1244" y="368" class="tiny">DB > 1GB → alert</text>
  <text x="1244" y="398" class="tiny">Routine truncate checkpoints</text>
  <text x="1244" y="428" class="tiny">keep p95 read latency stable</text>
  <text x="1244" y="458" class="tiny">rollback ready in one command</text>

  <rect x="1228" y="494" width="314" height="226" rx="10" fill="#0e1534" stroke="#7e56d8"/>
  <text x="1244" y="522" class="tiny">ROLLBACK</text>
  <text x="1244" y="558" class="v">hermes config set</text>
  <text x="1244" y="586" class="v">context.engine compressor</text>
  <text x="1244" y="620" class="tiny">verify: hermes config get context.engine</text>

  <!-- bottom strip -->
  <rect x="35" y="768" width="1530" height="100" rx="14" fill="#09152c" stroke="#2adfff" opacity="0.96"/>
  <text x="64" y="807" class="v">LCM CONTEXT ENGINE</text>
  <text x="310" y="807" class="tiny">• Lossless recall tools</text>
  <text x="540" y="807" class="tiny">• SQLite + FTS5 + WAL</text>
  <text x="775" y="807" class="tiny">• Stress validated</text>
  <text x="980" y="807" class="tiny">• Blind bake-off proven</text>
  <text x="1245" y="807" class="tiny">• Ready for upstream PR</text>

  <circle cx="56" cy="806" r="6" fill="#35f2ff" filter="url(#glow)"/>
  <circle cx="300" cy="806" r="4" fill="#35f2ff"/>
  <circle cx="530" cy="806" r="4" fill="#35f2ff"/>
  <circle cx="765" cy="806" r="4" fill="#35f2ff"/>
  <circle cx="970" cy="806" r="4" fill="#35f2ff"/>
  <circle cx="1235" cy="806" r="4" fill="#35f2ff"/>
</svg>