<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-label="LCM improvements for Hermes Agent">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#121936"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#172245"/>
      <stop offset="100%" stop-color="#1a2a55"/>
    </linearGradient>
    <style>
      .title{font:700 56px Inter,Segoe UI,Arial,sans-serif;fill:#edf4ff}
      .sub{font:400 26px Inter,Segoe UI,Arial,sans-serif;fill:#a9bce6}
      .h{font:700 30px Inter,Segoe UI,Arial,sans-serif;fill:#eaf2ff}
      .k{font:700 22px Inter,Segoe UI,Arial,sans-serif;fill:#7fddff}
      .v{font:500 22px Inter,Segoe UI,Arial,sans-serif;fill:#e4ecff}
      .plain{font:500 24px Inter,Segoe UI,Arial,sans-serif;fill:#dbe6ff}
      .foot{font:500 20px Inter,Segoe UI,Arial,sans-serif;fill:#9db2e0}
      .chip{font:700 18px Inter,Segoe UI,Arial,sans-serif;fill:#0a1428}
    </style>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>

  <text x="80" y="95" class="title">Hermes Memory Upgrade: LCM Context Engine</text>
  <text x="80" y="136" class="sub">Same agent, better long-memory behavior when chats get huge.</text>

  <rect x="80" y="180" width="1440" height="120" rx="18" fill="#111a36" stroke="#2d4f95"/>
  <text x="110" y="230" class="h">In plain English</text>
  <text x="110" y="270" class="plain">Old mode drops older details when context is compressed. LCM stores details safely and can recall them later.</text>

  <rect x="80" y="330" width="690" height="250" rx="18" fill="url(#card)" stroke="#3e5ca8"/>
  <text x="110" y="380" class="h">What improved</text>
  <text x="110" y="425" class="k">Fact recall in long chats:</text>
  <text x="470" y="425" class="v">100% vs 0%</text>
  <text x="110" y="465" class="k">Anchor + follow-up recall:</text>
  <text x="470" y="465" class="v">100% vs 0%</text>
  <text x="110" y="505" class="k">Latest preference recovery:</text>
  <text x="470" y="505" class="v">PASS vs FAIL</text>
  <rect x="600" y="350" width="140" height="34" rx="17" fill="#9dffb3"/>
  <text x="640" y="373" class="chip">WIN</text>

  <rect x="830" y="330" width="690" height="250" rx="18" fill="url(#card)" stroke="#3e5ca8"/>
  <text x="860" y="380" class="h">Reliability wins</text>
  <text x="860" y="425" class="k">Crash + restart integrity:</text>
  <text x="1220" y="425" class="v">PASS</text>
  <text x="860" y="465" class="k">Concurrency test:</text>
  <text x="1220" y="465" class="v">0 errors</text>
  <text x="860" y="505" class="k">Large-scale soak:</text>
  <text x="1220" y="505" class="v">250k msgs healthy</text>
  <rect x="1350" y="350" width="140" height="34" rx="17" fill="#9dffb3"/>
  <text x="1390" y="373" class="chip">PASS</text>

  <rect x="80" y="620" width="1440" height="170" rx="18" fill="#111a36" stroke="#2d4f95"/>
  <text x="110" y="670" class="h">What this means for Hermes users</text>
  <text x="110" y="712" class="plain">Fewer "you forgot what I said" moments. Better continuity across long sessions.</text>
  <text x="110" y="748" class="plain">Hermes can search old details instead of pretending they never existed.</text>

  <text x="80" y="855" class="foot">Evidence based on stress + blind recall bake-off tests in this repo docs.</text>
</svg>